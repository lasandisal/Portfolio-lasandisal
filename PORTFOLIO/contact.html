<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | lasandisal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="contact-style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                <a href="index.html">lasandisal<span>.</span></a>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <h1>Let's create something <span>amazing</span> together...</h1>

        <form class="contact-form">
            <div class="input-group">
                <input type="text" placeholder="What's your name?" required>
            </div>
            <div class="input-group">
                <input type="email" placeholder="What's your email?" required>
            </div>
            <div class="input-group">
                <input type="text" placeholder="What's your organization?">
            </div>
            <div class="input-group">
                <textarea placeholder="Your message?" rows="5"></textarea>
            </div>
        </form>

        <section class="contact-info">
            <div class="info-pill">
                <i class="fa-solid fa-envelope"></i>
                <div>
                    <strong>Email Me</strong>
                    <span>lasandisalwathura@gmail.com</span>
                </div>
            </div>
            <div class="info-pill">
                <i class="fa-solid fa-phone"></i>
                <div>
                    <strong>Call Me</strong>
                    <span>+94 71 921 7125</span>
                </div>
            </div>
        </section>

        <footer class="social-links">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
        </footer>
    </main>

</body>
</html>
